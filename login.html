<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — LUMERA SKIN</title>
    <meta name="description"
        content="Log in to Lumera Skin to access your curated skincare rituals. Join us and discover ethereal beauty products designed to illuminate your natural glow.">
    <meta name="keywords"
        content="skincare, luxury skincare, serums, beauty, skincare routine, vitamin c, hyaluronic acid">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="icon" href="./src/imgs/icons/lumera-skin-favicon.svg" />
    <link href="./src/output.css" rel="stylesheet">
</head>

<body>
    <main>
        <section class="h-screen grid grid-cols-1 sm:grid-cols-2">
            <div class="lfet relative sm:h-full">
                <img class="sm:hidden w-full" src="./src/imgs/login/Skincare routine closeup (1).webp" alt=""/>
                <img class="sm:hidden w-full absolute z-1 inset-0 " src="./src/imgs/login/Background (2).webp"/>
                <img class="hidden sm:block w-full h-full object-cover" src="./src/imgs/login/login pic.webp" alt="Lumera Ritual" />
                <img class="hidden sm:block w-full h-full absolute z-1 inset-0" src="./src/imgs/login/Background (1).webp" />
                <div class=" w-[90%] sm:w-[70%] absolute z-2 left-1/2 -translate-x-1/2 sm:translate-x-0 sm:left-20 sm:bottom-20 bottom-1/2 translate-y-1/2 sm:translate-y-0 text-whitetext">
                    <p class="small-text tracking-[0.125rem]">
                        THE ETHEREAL CURATOR
                    </p>
                    <h1 class="text-whitetext font-Garamond italic text-4xl lg:text-6xl leading-10 md:leading-12 lg:leading-15 mt-4">
                        A ritual of light and
                        skin.
                    </h1>
                </div>
            </div>
            <div class="right flex justify-center items-center  py-15 lg:py-0">
                <div class=" w-[80%] lg:w-[70%] flex flex-col gap-12">
                    <div class="head col gap-4">
                        <h2 class="font-Garamond font-normal
                        text-lg lg:text-2xl leading-6 lg:leading-8 lg:tracking-[0.063rem] tracking-[0.15rem]">
                            LUMERA SKIN
                        </h2>
                        <div class="col gap-0.75">
                            <h3 class="font-Garamond font-normal 
                            text-xl lg:text-4xl leading-6 lg:leading-8">
                                Welcome back
                            </h3>
                            <p class="text-xs lg:text-sm leading-3.5 lg:leading-5.5">
                                Enter your details to access your curated ritual.
                            </p>
                        </div>
                    </div>
                    <form class="w-full col gap-10">
                        <div class="w-full col gap-8">
                            <label class="w-full col gap-2">
                                <span class="uppercase text-lable small-text">EMAIL ADDRESS</span>
                                <input class="focus:border-b-[0.094rem] focus:border-b-tertiary focus:outline-0 
                                w-full py-3.5 border-b border-b-tertiary/40
                            placeholder:text-placeholderlogin placeholder:text-sm" placeholder="name@example.com" type="email"
                                    name="u_email">
                            </label>
                            <div class="w-full col items-stretch gap-2">
                                <div class="row justify-between">
                                    <label class="uppercase text-lable small-text" for="pass-w">PASSWORD</label>
                                    <a class="small-text tracking-[0.033rem] button-hover" href="#">FORGOT?</a>
                                </div>
                                <input class="focus:border-b-[0.094rem] focus:border-b-tertiary focus:outline-0 
                                w-full py-3.5 border-b border-b-tertiary/40
                            placeholder:text-placeholderlogin placeholder:text-sm" id="pass-w" placeholder="••••••••"
                                    type="password" name="password" required>
                            </div>
                        </div>
                        <div class="buttons w-full col items-center gap-6">
                            <a class="bg-primary text-whitetext w-full rounded-[10px] 
                            row items-center justify-center gap-2 mt-4 py-5
                            button-hover" href="#">
                                <span class="text-[0.625rem] md:text-xs leading-2.5 md:leading-4 tracking-widest font-normal">SIGN IN</span>
                                <img src="./src/imgs/icons/arrowright.svg" width="8.75px" />
                            </a>
                            <div class="divider row w-full justify-between">
                                <hr class="w-[45%] border border-tertiary/30"> <span
                                    class="font-Garamond italic text-sm leading-5">or</span>
                                <hr class="w-[45%] border border-tertiary/30">
                            </div>
                            <a class="bg-whitetext text-primary border border-tertiary/50 w-full rounded-[10px] 
                            row items-center justify-center gap-2 py-5
                            button-hover" href="#">
                                <img src="./src/imgs/login/headset.svg" />
                                <span class="text-[0.625rem] md:text-xs leading-2.5 md:leading-4 tracking-widest font-normal">
                                    CONTINUE WITH GOOGLE
                                </span>
                            </a>
                        </div>
                    </form>
                    <div class="bottom w-full row items-end gap-px justify-center">
                        <p class="mt-4 text-xs md:text-sm leading-3.5 md:leading-5 font-normal">
                            Don't have an account?
                        </p>
                        <a class="text-xs md:text-sm leading-3.5 md:leading-5 font-medium underline text-primary
                        hover:opacity-60 button-hover" href="./register.html">
                            Create one
                        </a>
                    </div>
                    <div class="footer w-full pt-12">
                        <div class="row justify-between">
                            <p class="xsmall-text font-normal leading-3.75 tracking-[0.06rem] text-placeholder">
                                © 2024 LUMERA SKIN
                            </p>
                            <div class="row gap-3 sm:gap-6
                            xsmall-text font-normal leading-3.75 tracking-[0.06rem] text-placeholder">
                                <a class="hover:underline hover:underline-offset-1 button-hover" href="#">
                                    PRIVACY
                                </a>
                                <a class="hover:underline hover:underline-offset-1 button-hover" href="#">
                                    TERMS
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
