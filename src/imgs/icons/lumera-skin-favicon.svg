<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#fdf9f7" rx="8"/>

  <!-- Letter L — big, dark -->
  <text x="5" y="50" font-family="Georgia, serif" font-weight="700" font-size="46" fill="#77525C">L</text>

  <!-- Letter S — smaller, lighter -->
  <text x="33" y="48" font-family="Georgia, serif" font-weight="400" font-size="30" fill="#b8909a">S</text>

  <!-- Gradient underline -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#77525C"/>
      <stop offset="100%" stop-color="#b8909a"/>
    </linearGradient>
  </defs>
  <line x1="4" y1="57" x2="60" y2="57" stroke="url(#g)" stroke-width="2"/>
</svg>
